<h1 class = "chapter-title">第一课:  了解生活 Quiz</h1>

    <div class="quiz">
        <p>Drag the correct word into the blank</p>

        <div class="choices">
            <span draggable="true" class="word">爱护</span>
            <span draggable="true" class="word">等待</span>
            <span draggable="true" class="word">递</span>
        </div>

        <div class="question">
            <p>1. 他从小就<span class="blank" data-answer="爱护"></span>小宠物。</p>
            <p class="result"></p>
        </div>

        <div class="question">
            <p>2. 他一直在门口 <span class="blank" data-answer="等待"></span> 朋友。</p>
            <p class="result"></p>
        </div>

        <div class="question">
            <p>3. 请把书 <span class="blank" data-answer="递"></span> 给我。</p>
            <p class="result"></p>
        </div>

        <div class="question arrange-question" data-answer="我每天早上喝咖啡">
            <p>Arrange the sentence:</p>

            <div class="words">
                <span draggable="true" class="item">喝咖啡</span>
                <span draggable="true" class="item">每天</span>
                <span draggable="true" class="item">我</span>
                <span draggable="true" class="item">早上</span>
            </div>

            <div class="answer-box"></div>
            <p class="result"></p>

        </div>

        <button onclick="submitQuiz()">Submit Quiz</button>
        <p id="score"></p>

    </div>
